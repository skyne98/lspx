# lspx language-server registry.
#
# This mirrors Helix's languages.toml schema exactly:
#   [language-server.<id>]   -> command + args (+ optional config)
#   [[language]]              -> name, file-types, roots, language-servers[]
#
# Commands/args are the canonical, stable invocation for each stdio LSP
# (the same contracts Helix, Neovim, and others rely on). Curated to the
# languages an AI coding agent actually navigates; extend freely.

[language-server.rust-analyzer]
command = "rust-analyzer"
install = "rustup component add rust-analyzer"

[language-server.gopls]
command = "gopls"
args = ["serve"]
install = "go install golang.org/x/tools/gopls@latest"

[language-server.typescript-language-server]
command = "typescript-language-server"
args = ["--stdio"]
install = "npm i -g typescript-language-server typescript"

[language-server.vtsls]
command = "vtsls"
args = ["--stdio"]
install = "npm i -g @vtsls/language-server"

[language-server.pyright]
command = "pyright-langserver"
args = ["--stdio"]
install = "npm i -g pyright"

[language-server.basedpyright]
command = "basedpyright-langserver"
args = ["--stdio"]
install = "pipx install basedpyright"

[language-server.pylsp]
command = "pylsp"
install = "pip install python-lsp-server[all]"

[language-server.ruff]
command = "ruff"
args = ["server"]
install = "pip install ruff"

[language-server.clangd]
command = "clangd"
install = "apt install clangd   # or: brew install llvm"

[language-server.lua-language-server]
command = "lua-language-server"
install = "https://github.com/LuaLS/lua-language-server"

[language-server.zls]
command = "zls"
install = "https://github.com/zigtools/zig"

[language-server.nil]
command = "nil"
install = "nix profile install github:oxalica/nil"

[language-server.nixd]
command = "nixd"
install = "nix profile install github:nix-community/nixd"

[language-server.marksman]
command = "marksman"
args = ["server"]
install = "https://github.com/artempyanykh/marksman"

[language-server.taplo]
command = "taplo"
args = ["lsp", "stdio"]
install = "cargo install taplo-cli"

[language-server.tombi]
command = "tombi"
args = ["lsp"]
install = "cargo install tombi-cli"

[language-server.yaml-language-server]
command = "yaml-language-server"
args = ["--stdio"]
install = "npm i -g yaml-language-server"

[language-server.vscode-json-language-server]
command = "vscode-json-language-server"
args = ["--stdio"]
install = "npm i -g vscode-langservers-extracted"

[language-server.vscode-css-language-server]
command = "vscode-css-language-server"
args = ["--stdio"]
install = "npm i -g vscode-langservers-extracted"

[language-server.vscode-html-language-server]
command = "vscode-html-language-server"
args = ["--stdio"]
install = "npm i -g vscode-langservers-extracted"

[language-server.bash-language-server]
command = "bash-language-server"
args = ["start"]
install = "npm i -g bash-language-server"

[language-server.awk-language-server]
command = "awk-language-server"
install = "npm i -g awk-language-server"

[language-server.dockerfile-language-server]
command = "docker-langserver"
args = ["--stdio"]
install = "npm i -g dockerfile-language-server-nodejs"

[language-server.docker-language-server]
command = "docker-language-server"
args = ["start", "--stdio"]
install = "npm i -g @docker/docker-language-server"

[language-server.solargraph]
command = "solargraph"
args = ["stdio"]
install = "gem install solargraph"

[language-server.ruby-lsp]
command = "ruby-lsp"
install = "gem install ruby-lsp"

[language-server.sorbet]
command = "srb"
args = ["tc", "--lsp"]
install = "gem install sorbet"

[language-server.phpactor]
command = "phpactor"
args = ["language-server"]
install = "https://phpactor.readthedocs.io"

[language-server.intelephense]
command = "intelephense"
args = ["--stdio"]
install = "npm i -g intelephense"

[language-server.kotlin-language-server]
command = "kotlin-language-server"
install = "https://github.com/fwcd/kotlin-language-server"

[language-server.jdtls]
command = "jdtls"
install = "https://github.com/eclipse/eclipse.jdt.ls"

[language-server.csharp-ls]
command = "csharp-ls"
install = "dotnet tool install -g csharp-ls"

[language-server.omnisharp]
command = "omnisharp"
args = ["-lsp"]
install = "https://github.com/OmniSharp/omnisharp-roslyn"

[language-server.elixir-ls]
command = "elixir-ls"
install = "https://github.com/elixir-lsp/elixir-ls"

[language-server.erlang-ls]
command = "erlang_ls"
install = "https://github.com/erlang-ls/erlang_ls"

[language-server.haskell-language-server]
command = "haskell-language-server-wrapper"
args = ["--lsp"]
install = "ghcup install hls"

[language-server.metals]
command = "metals"
install = "https://scalameta.org/metals"

[language-server.swift-sourcekit-lsp]
command = "sourcekit-lsp"
install = "swift.org / Xcode"

[language-server.dart-language-server]
command = "dart"
args = ["language-server", "--protocol=lsp"]
install = "https://dart.dev/get-dart"

[language-server.vue-language-server]
command = "vue-language-server"
args = ["--stdio"]
install = "npm i -g @vue/language-server"

[language-server.svelteserver]
command = "svelteserver"
args = ["--stdio"]
install = "npm i -g svelte-language-server"

[language-server.astro-ls]
command = "astro-ls"
args = ["--stdio"]
install = "npm i -g @astrojs/language-server"

[language-server.tailwindcss-language-server]
command = "tailwindcss-language-server"
args = ["--stdio"]
install = "npm i -g @tailwindcss/language-server"

[language-server.graphql-lsp]
command = "graphql-lsp"
args = ["server", "--stdio"]
install = "npm i -g graphql-language-service-cli"

[language-server.ocaml-lsp]
command = "ocamllsp"
install = "https://github.com/ocaml/ocaml-lsp"

[language-server.fsautocomplete]
command = "fsautocomplete"
install = "dotnet tool install -g fsautocomplete"

[language-server.tinymist]
command = "tinymist"
install = "cargo install tinymist"

[language-server.julia-language-server]
command = "julia"
args = ["--project=@juliadotls", "-e", "using LanguageServer; runserver()"]
install = "https://github.com/julia-vscode/LanguageServer.jl"

[language-server.r-languageserver]
command = "R"
args = ["--slave", "-e", "languageserver::run()"]
install = "R -e 'install.packages(\"languageserver\")'"

[language-server.terraform-ls]
command = "terraform-ls"
install = "https://github.com/hashicorp/terraform-ls"

[language-server.powershell-editor-services]
command = "pwsh"
args = ["-NoLogo", "-NoProfile", "-Command", "PSES start"]
install = "https://github.com/PowerShell/PowerShellEditorServices"

# --- languages ---

[[language]]
name = "rust"
file-types = ["rs"]
roots = ["Cargo.toml", "Cargo.lock"]
language-servers = ["rust-analyzer"]

[[language]]
name = "go"
file-types = ["go"]
roots = ["go.work", "go.mod"]
language-servers = ["gopls"]

[[language]]
name = "typescript"
file-types = ["ts", "mts", "cts"]
roots = ["package.json", "tsconfig.json"]
language-servers = ["typescript-language-server", "vtsls"]

[[language]]
name = "javascript"
file-types = ["js", "mjs", "cjs"]
roots = ["package.json", "jsconfig.json"]
language-servers = ["typescript-language-server", "vtsls"]

[[language]]
name = "jsx"
file-types = ["jsx"]
roots = ["package.json", "jsconfig.json"]
language-servers = ["typescript-language-server"]

[[language]]
name = "tsx"
file-types = ["tsx"]
roots = ["package.json", "tsconfig.json"]
language-servers = ["typescript-language-server"]

[[language]]
name = "vue"
file-types = ["vue"]
roots = ["package.json"]
language-servers = ["vue-language-server", "typescript-language-server"]

[[language]]
name = "svelte"
file-types = ["svelte"]
roots = ["package.json", "svelte.config.js"]
language-servers = ["svelteserver"]

[[language]]
name = "astro"
file-types = ["astro"]
roots = ["package.json", "astro.config.mjs"]
language-servers = ["astro-ls"]

[[language]]
name = "python"
file-types = ["py", "pyi", "pyw"]
roots = ["pyproject.toml", "setup.py", "requirements.txt"]
language-servers = ["pyright", "basedpyright", "pylsp", "ruff"]

[[language]]
name = "c"
file-types = ["c", "h"]
roots = ["compile_commands.json", "Makefile"]
language-servers = ["clangd"]

[[language]]
name = "cpp"
file-types = ["cc", "cpp", "cxx", "hh", "hpp", "hxx", "h", "ipp", "tpp"]
roots = ["compile_commands.json", "Makefile", "CMakeLists.txt"]
language-servers = ["clangd"]

[[language]]
name = "cuda"
file-types = ["cu", "cuh"]
roots = ["CMakeLists.txt"]
language-servers = ["clangd"]

[[language]]
name = "objective-c"
file-types = ["m", "mm", "h"]
roots = ["Podfile", "compile_commands.json"]
language-servers = ["clangd"]

[[language]]
name = "java"
file-types = ["java"]
roots = ["pom.xml", "build.gradle", "build.gradle.kts", "settings.gradle"]
language-servers = ["jdtls"]

[[language]]
name = "kotlin"
file-types = ["kt", "kts"]
roots = ["build.gradle", "build.gradle.kts", "settings.gradle"]
language-servers = ["kotlin-language-server"]

[[language]]
name = "c-sharp"
file-types = ["cs", "csx"]
roots = ["*.sln", "*.csproj"]
language-servers = ["csharp-ls", "omnisharp"]

[[language]]
name = "f-sharp"
file-types = ["fs", "fsx", "fsi"]
roots = ["*.fsproj", "*.sln"]
language-servers = ["fsautocomplete"]

[[language]]
name = "ruby"
file-types = ["rb"]
roots = ["Gemfile", "Rakefile", "*.gemspec"]
language-servers = ["solargraph", "ruby-lsp"]

[[language]]
name = "php"
file-types = ["php"]
roots = ["composer.json"]
language-servers = ["intelephense", "phpactor"]

[[language]]
name = "lua"
file-types = ["lua"]
roots = [".luarc.json", ".luacheckrc"]
language-servers = ["lua-language-server"]

[[language]]
name = "swift"
file-types = ["swift"]
roots = ["Package.swift", "*.xcodeproj"]
language-servers = ["swift-sourcekit-lsp"]

[[language]]
name = "elixir"
file-types = ["ex", "exs"]
roots = ["mix.exs", "mix.lock"]
language-servers = ["elixir-ls"]

[[language]]
name = "erlang"
file-types = ["erl", "hrl"]
roots = ["rebar.config", "erlang.mk"]
language-servers = ["erlang-ls"]

[[language]]
name = "haskell"
file-types = ["hs"]
roots = ["*.cabal", "stack.yaml", "package.yaml"]
language-servers = ["haskell-language-server"]

[[language]]
name = "scala"
file-types = ["scala", "sc"]
roots = ["build.sbt", "build.sc", "project/build.properties"]
language-servers = ["metals"]

[[language]]
name = "dart"
file-types = ["dart"]
roots = ["pubspec.yaml"]
language-servers = ["dart-language-server"]

[[language]]
name = "bash"
file-types = ["sh", "bash"]
roots = []
language-servers = ["bash-language-server"]

[[language]]
name = "awk"
file-types = ["awk"]
roots = []
language-servers = ["awk-language-server"]

[[language]]
name = "zig"
file-types = ["zig"]
roots = ["build.zig"]
language-servers = ["zls"]

[[language]]
name = "nix"
file-types = ["nix"]
roots = ["flake.nix", "shell.nix"]
language-servers = ["nil", "nixd"]

[[language]]
name = "ocaml"
file-types = ["ml", "mli"]
roots = ["dune-project"]
language-servers = ["ocaml-lsp"]

[[language]]
name = "markdown"
file-types = ["md", "markdown"]
roots = []
language-servers = ["marksman"]

[[language]]
name = "toml"
file-types = ["toml"]
roots = []
language-servers = ["taplo", "tombi"]

[[language]]
name = "yaml"
file-types = ["yml", "yaml"]
roots = []
language-servers = ["yaml-language-server"]

[[language]]
name = "json"
file-types = ["json"]
roots = []
language-servers = ["vscode-json-language-server"]

[[language]]
name = "css"
file-types = ["css"]
roots = []
language-servers = ["vscode-css-language-server"]

[[language]]
name = "html"
file-types = ["html", "htm"]
roots = []
language-servers = ["vscode-html-language-server"]

[[language]]
name = "dockerfile"
file-types = [{ glob = "Dockerfile" }]
roots = ["Dockerfile"]
language-servers = ["dockerfile-language-server"]

[[language]]
name = "docker-compose"
file-types = [{ glob = "docker-compose.yml" }, { glob = "docker-compose.yaml" }]
roots = ["docker-compose.yml"]
language-servers = ["docker-language-server", "yaml-language-server"]

[[language]]
name = "graphql"
file-types = ["graphql", "gql"]
roots = [".graphqlrc", ".graphqlrc.yml"]
language-servers = ["graphql-lsp"]

[[language]]
name = "typst"
file-types = ["typ"]
roots = ["*.typ"]
language-servers = ["tinymist"]

[[language]]
name = "julia"
file-types = ["jl"]
roots = ["Project.toml"]
language-servers = ["julia-language-server"]

[[language]]
name = "r"
file-types = ["r", "R"]
roots = ["DESCRIPTION"]
language-servers = ["r-languageserver"]

[[language]]
name = "terraform"
file-types = ["tf", "tfvars"]
roots = [".terraform"]
language-servers = ["terraform-ls"]

[[language]]
name = "powershell"
file-types = ["ps1", "psm1"]
roots = ["*.psproj"]
language-servers = ["powershell-editor-services"]

# --- GLSL (shader language) ---
[language-server.glslls]
command = "glslls"
args = ["--stdio"]

[language-server.glsl_analyzer]
command = "glsl_analyzer"

[[language]]
name = "glsl"
file-types = ["glsl", "vert", "frag", "comp", "tesc", "tese", "geom"]
roots = []
language-servers = ["glsl_analyzer", "glslls"]
